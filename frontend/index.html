    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
            mono: ['SF Mono', 'Menlo', 'Monaco', 'Courier New', 'monospace'],
            orbitron: ['Orbitron', 'sans-serif'],
          },
          extend: {
            colors: {
              apple: {
                bg: '#F5F5F7',
                gray: '#86868b',
                blue: '#0071E3',
                text: '#1d1d1f',
                card: '#FFFFFF',
                border: '#d2d2d7'
              }
            },
            boxShadow: {
              'apple': '0 4px 24px rgba(0, 0, 0, 0.04)',
              'apple-hover': '0 8px 32px rgba(0, 0, 0, 0.08)',
              'apple-card': '0 1px 3px rgba(0,0,0,0.05), 0 10px 25px -5px rgba(0,0,0,0.02)',
            }
          }
        }
      }
    </script>
    <style>
      /* Apple-style subtle scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d1d6;
        border-radius: 10px;
        border: 3px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: #8e8e93;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Apple Style Mermaid Container */
      .mermaid {
        display: flex;
        justify-content: center;
        background: #ffffff;
        padding: 2.5rem;
        border-radius: 1.5rem; /* ~24px */
        margin: 2rem 0;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); /* shadow-apple */
        border: 1px solid rgba(0, 0, 0, 0.03);
        transition: transform 0.2s ease;
      }
      
      .mermaid:hover {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }

      /* Hide scrollbar for horizontal scrolling elements but allow functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Linear fade mask for horizontal lists */
      .mask-linear-fade {
        mask-image: linear-gradient(to right, black 85%, transparent 100%);
        -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
      }

      /* --- Auto Numbering for Wiki (DISABLED) --- */
      /* CSS 自动编号已禁用，使用后端返回的编号 */

      .wiki-root .wiki-h4::before {

        content: counter(h2counter) "." counter(h3counter) "." counter(h4counter) " ";
        color: #86868b;
        margin-right: 6px;
        font-size: 0.9em;
      } */

      /* --- Markdown List Fixes --- */
      /* Force display bullets and numbers inside WikiBlock list components */
      ul.wiki-list {
        list-style-type: disc !important;
      }
      ol.wiki-list {
        list-style-type: decimal !important;
      }
      .wiki-list li {
        padding-left: 0.25rem; /* slight spacing between bullet and text */
      }

      /* --- CodeNexus.AI Logo Styles --- */
      .logo-font {
        font-family: 'Orbitron', sans-serif;
      }
      .logo-text-main {
        color: #1d1d1f; /* Dark text for Light Theme */
        text-shadow: 0 2px 5px rgba(0,0,0,0.05);
      }
      .logo-dot {
        color: #86868b;
        margin: 0 1px;
      }
      .logo-text-ai {
        color: #00C853; /* Tech Green (Material Green A700) - readable on light bg */
        position: relative;
        display: inline-block;
        text-shadow: 0 0 10px rgba(0, 200, 83, 0.3);
        animation: logo-pulse 3s infinite ease-in-out;
      }
      .logo-cursor {
        display: inline-block;
        width: 0.18em;
        height: 0.8em;
        background-color: #00C853;
        margin-left: 3px;
        vertical-align: baseline;
        animation: logo-blink 1s step-end infinite;
        opacity: 0.8;
      }
      @keyframes logo-pulse {
        0%, 100% {
            text-shadow: 
                0 0 5px rgba(0, 200, 83, 0.3),
                0 0 15px rgba(0, 200, 83, 0.1);
        }
        50% {
            text-shadow: 
                0 0 10px rgba(0, 200, 83, 0.6),
                0 0 20px rgba(0, 200, 83, 0.3);
            color: #00E676; /* Slightly lighter green on pulse */
        }
      }
      @keyframes logo-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
